<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hub</title>
    <!-- Font Awesome Link for clean, reliable icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      body {
        background-color: #1a1a1a;
        font-family: Arial, sans-serif;
        color: #ededed;
        margin: 0;
        padding: 0;
      }

      .center {
        text-align: center;
        margin-top: 50px;
      }

      h1 {
        color: #ededed;
      }

      .launch-grid {
        list-style: none;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        max-width: 650px;
        margin: 40px auto 0 auto;
      }

      .launch-grid li a {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-decoration: none;
        color: #696969;
        border: 2px solid #707070;
        width: 180px;
        height: 180px;
        font-size: 1.3rem;
        font-weight: bold;
        border-radius: 16px;
        transition: all 0.25s ease;
      }

      .launch-grid li a i {
        font-size: 3.2rem;
      }

      .launch-grid li a:hover {
        background-color: #1f51ff;
        color: #ededed;
        box-shadow: 0 8px 25px rgba(31, 81, 255, 0.4);
        transform: translateY(-4px);
        cursor: pointer;
      }

      /* Mobile Layout Rules */
      @media (max-width: 600px) {
        .launch-grid {
          flex-direction: column;
          align-items: center;
        }

        .launch-grid li a {
          width: 80vw;
          height: auto;
          padding: 20px;
          flex-direction: row;
          justify-content: flex-start;
          gap: 20px;
        }

        .launch-grid li a i {
          font-size: 24px;
          margin-bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="center">
      <h1>Central Hub</h1>
      <p>Get to work!</p>
    </div>

    <ul class="launch-grid">
      <li><a href="https://google.com"><i class="fa-solid fa-magnifying-glass"></i>Google</a></li>
      <li><a href="https://github.com"><i class="fa-brands fa-github"></i>GitHub</a></li>
      <li><a href="https://wikipedia.org"><i class="fa-solid fa-book-open"></i>Wiki</a></li>
      <li><a href="https://splookysplook.github.io/Distraction-Free-Writing/"><i class="fa-solid fa-file-lines"></i>Text</a></li>
      <li><a href="https://gemini.google.com"><i class="fa-solid fa-microchip"></i>Gemini</a></li>
      <li><a href="https://vscode.dev"><i class="fa-solid fa-code"></i>VS Code</a></li>
    </ul>
  </body>
</html>
